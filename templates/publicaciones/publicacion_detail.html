{% extends "base.html" %}

{% block content %}
    <div class="detalle-header">
        <h1>{{ publicacion.titulo }}</h1>
    </div>
    <div class="detalle-body">
        <p class="detalle-meta">{{ publicacion.autor }} &middot; {{ publicacion.fecha_publicacion }}</p>
        <p>{{ publicacion.contenido }}</p>
    </div>
    <div style="margin-top:1.2rem;">
        <a href="{% url 'publicaciones:lista_publicaciones' %}" class="btn btn-secondary">← Volver al listado</a>
    </div>
{% endblock %}
